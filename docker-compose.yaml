services:
  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: happielearning/mongo:1.0.0
    container_name: mongo
  
  redis:
    image: redis:7
    container_name: redis

  mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    image: happielearning/mysql:1.0.0
    container_name: mysql

  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    image: happielearning/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb

  user:
    build:
      context: ./user
      dockerfile: Dockerfile
    image: happielearning/user:1.0.0
    container_name: user
    depends_on:
      - redis
  
  cart:
    build:
      context: ./cart
      dockerfile: ./Dockerfile
    image: happielearning/cart:1.0.0
    container_name: cart
    depends_on:
      - mongodb
      - redis

  shipping:
    build: 
      context: ./shipping
      dockerfile: Dockerfile
    image: happielearning/shipping:1.0.0 
    container_name: shipping
    depends_on:
      - mysql
      
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: happielearning/frontend:1.0.0
    container_name: frontend
    ports:
      - 80:80
    depends_on:
      - catalogue
      - user
      - cart

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if set to true, we have to create manually using `docker network create roboshop` before running the compose file